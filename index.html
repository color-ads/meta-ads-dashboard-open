<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Open C60 · Panel de Leads</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --navy:    #0F1E3C;
      --navy2:   #1a2f52;
      --blue:    #2563EB;
      --blue-lt: #EFF6FF;
      --green:   #059669;
      --bg:      #F4F6FA;
      --card:    #FFFFFF;
      --border:  #E5E7EB;
      --text:    #111827;
      --text2:   #6B7280;
      --text3:   #9CA3AF;
      --r:       14px;
      --sh:      0 1px 3px rgba(0,0,0,.06), 0 4px 16px rgba(0,0,0,.05);
    }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

    /* Setup */
    .sw { min-height:100vh; display:flex; flex-direction:column; align-items:center; justify-content:center; padding:2rem; background:var(--navy); }
    .sl { color:#fff; font-size:30px; font-weight:700; letter-spacing:-.5px; margin-bottom:4px; }
    .ss { color:rgba(255,255,255,.4); font-size:13px; margin-bottom:2.5rem; letter-spacing:.5px; text-transform:uppercase; }
    .sc { background:#fff; border-radius:var(--r); padding:2rem; width:100%; max-width:400px; }
    .sc h2 { font-size:15px; font-weight:600; color:var(--navy); margin-bottom:1.5rem; }
    .fi { margin-bottom:14px; }
    .fi label { display:block; font-size:11px; font-weight:600; color:var(--text2); margin-bottom:5px; text-transform:uppercase; letter-spacing:.5px; }
    .fi input { width:100%; padding:10px 14px; border:1.5px solid var(--border); border-radius:10px; font-size:14px; transition:border-color .2s; }
    .fi input:focus { outline:none; border-color:var(--blue); }
    .fi .hint { font-size:11px; color:var(--text3); margin-top:4px; }
    .btn-c { width:100%; padding:12px; background:var(--navy); color:#fff; border:none; border-radius:10px; font-size:14px; font-weight:600; cursor:pointer; margin-top:6px; transition:background .2s; }
    .btn-c:hover { background:var(--navy2); }
    .btn-c:disabled { opacity:.4; cursor:default; }

    /* Topbar */
    .tb { background:var(--navy); padding:0 2rem; display:flex; align-items:center; justify-content:space-between; height:58px; position:sticky; top:0; z-index:100; }
    .tb-brand .tb-logo { color:#fff; font-size:17px; font-weight:700; letter-spacing:-.3px; }
    .tb-brand .tb-sub  { color:rgba(255,255,255,.4); font-size:10px; text-transform:uppercase; letter-spacing:.8px; margin-top:1px; }
    .tb-right { display:flex; align-items:center; gap:16px; }
    .upd { font-size:11px; color:rgba(255,255,255,.38); }
    .rl-row { display:flex; align-items:center; gap:6px; font-size:11px; color:rgba(255,255,255,.38); }
    .rl-bar { width:44px; height:4px; border-radius:2px; background:rgba(255,255,255,.12); overflow:hidden; }
    .rl-fill { height:100%; border-radius:2px; transition:width .4s; }
    .btn-out { background:rgba(255,255,255,.08); border:none; color:rgba(255,255,255,.6); padding:6px 14px; border-radius:8px; font-size:12px; cursor:pointer; }
    .btn-out:hover { background:rgba(255,255,255,.15); }

    /* Tab bar */
    .tabbar { background:var(--card); border-bottom:1px solid var(--border); padding:0 2rem; display:flex; align-items:center; }
    .tab { background:none; border:none; border-bottom:2.5px solid transparent; padding:14px 18px; font-size:13px; font-weight:500; color:var(--text2); cursor:pointer; }
    .tab:hover { color:var(--text); }
    .tab.on { color:var(--blue); border-bottom-color:var(--blue); }
    .tab-r { margin-left:auto; }
    .btn-ref { background:var(--blue-lt); color:var(--blue); border:none; border-radius:8px; padding:7px 14px; font-size:12px; font-weight:500; cursor:pointer; }
    .btn-ref:hover { opacity:.85; }
    .btn-ref:disabled { opacity:.4; cursor:default; }

    /* Main */
    .main { padding:2rem; max-width:1200px; margin:0 auto; }

    /* KPI grid */
    .kpi-grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(155px,1fr)); gap:14px; margin-bottom:2rem; }
    .kc { background:var(--card); border:1px solid var(--border); border-radius:var(--r); padding:1.25rem 1.5rem; box-shadow:var(--sh); }
    .kc.dark { background:var(--navy); border-color:var(--navy); }
    .kc-label { font-size:11px; font-weight:600; text-transform:uppercase; letter-spacing:.6px; color:var(--text2); margin-bottom:6px; }
    .kc.dark .kc-label { color:rgba(255,255,255,.45); }
    .kc-val { font-size:28px; font-weight:700; letter-spacing:-1px; }
    .kc.dark .kc-val { color:#fff; }
    .kc-sub { font-size:11px; color:var(--text3); margin-top:4px; }
    .kc.dark .kc-sub { color:rgba(255,255,255,.3); }

    /* Chart card */
    .ch-card { background:var(--card); border:1px solid var(--border); border-radius:var(--r); box-shadow:var(--sh); padding:1.5rem; margin-bottom:2rem; }
    .ch-head { display:flex; justify-content:space-between; align-items:flex-start; margin-bottom:1.5rem; }
    .ch-title { font-size:15px; font-weight:600; }
    .ch-sub   { font-size:12px; color:var(--text2); margin-top:2px; }
    .ch-wrap  { position:relative; height:260px; }

    /* Table card */
    .tc { background:var(--card); border:1px solid var(--border); border-radius:var(--r); box-shadow:var(--sh); overflow:hidden; margin-bottom:2rem; }
    .tc-head { padding:1.25rem 1.5rem; border-bottom:1px solid var(--border); }
    .tc-title { font-size:15px; font-weight:600; }
    .tw { overflow-x:auto; }
    table { width:100%; border-collapse:collapse; font-size:13px; }
    th { padding:10px 16px; text-align:left; font-size:11px; font-weight:600; text-transform:uppercase; letter-spacing:.5px; color:var(--text2); background:#FAFAFA; border-bottom:1px solid var(--border); }
    td { padding:12px 16px; border-bottom:1px solid #F3F4F6; }
    tr:last-child td { border-bottom:none; }
    tr:hover td { background:#FAFAFA; }
    .r { text-align:right; }
    .td-m { font-weight:600; }
    .td-l { font-weight:700; color:var(--green); font-size:14px; }
    .td-n { font-family:'Courier New',monospace; }
    .badge { display:inline-block; font-size:11px; font-weight:600; padding:3px 10px; border-radius:20px; }

    /* States */
    .loading { display:flex; flex-direction:column; align-items:center; justify-content:center; padding:4rem; color:var(--text2); gap:12px; font-size:14px; }
    @keyframes spin { to { transform:rotate(360deg); } }
    .spin { width:22px; height:22px; border:2.5px solid var(--border); border-top-color:var(--blue); border-radius:50%; animation:spin .7s linear infinite; }
    .err { background:#FEF2F2; border:1px solid #FECACA; border-radius:10px; padding:12px 16px; font-size:13px; color:#B91C1C; margin-bottom:1rem; }
    .empty { text-align:center; padding:3rem; color:var(--text2); font-size:14px; }
    .foot { text-align:center; padding:2rem; font-size:11px; color:var(--text3); }

    @media(max-width:600px){
      .main{padding:1rem} .tb{padding:0 1rem} .tabbar{padding:0 .5rem}
      .kc-val{font-size:22px} .upd{display:none}
    }
  </style>
</head>
<body>
<div id="app"></div>
<script>
const API="https://graph.facebook.com/v21.0", THROTTLE=300, WARN=75, STOP=92, SINCE="2025-01-01";
const MES=["Ene","Feb","Mar","Abr","May","Jun","Jul","Ago","Sep","Oct","Nov","Dic"];
const MES_F=["Enero","Febrero","Marzo","Abril","Mayo","Junio","Julio","Agosto","Septiembre","Octubre","Noviembre","Diciembre"];
const ST={ACTIVE:{l:"Activa",bg:"#DCFCE7",c:"#166534"},PAUSED:{l:"Pausada",bg:"#FEF9C3",c:"#854D0E"},ARCHIVED:{l:"Archivada",bg:"#F3F4F6",c:"#4B5563"},DELETED:{l:"Eliminada",bg:"#FEE2E2",c:"#991B1B"},CAMPAIGN_PAUSED:{l:"Camp. pausada",bg:"#FEF9C3",c:"#854D0E"},PENDING_REVIEW:{l:"En revisión",bg:"#DBEAFE",c:"#1E40AF"},DISAPPROVED:{l:"Rechazada",bg:"#FEE2E2",c:"#991B1B"},WITH_ISSUES:{l:"Con problemas",bg:"#FEE2E2",c:"#991B1B"}};
const OBJ={OUTCOME_LEADS:"Leads",OUTCOME_SALES:"Ventas",OUTCOME_TRAFFIC:"Tráfico",OUTCOME_ENGAGEMENT:"Engagement",LEAD_GENERATION:"Generación de leads",OUTCOME_AWARENESS:"Reconocimiento"};

const fn=n=>n==null?"—":Number(n).toLocaleString("es-MX");
const fp=n=>n==null?"—":parseFloat(n).toFixed(2)+"%";
const fd=s=>s?new Date(s).toLocaleDateString("es-MX"):"—";
const fNow=()=>{const d=new Date();return d.toLocaleDateString("es-MX",{day:"numeric",month:"long",year:"numeric"})+" · "+d.toLocaleTimeString("es-MX",{hour:"2-digit",minute:"2-digit"});};
const esc=s=>String(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");

function leads(actions){
  if(!actions||!Array.isArray(actions))return 0;
  const t=["lead","offsite_conversion.fb_pixel_lead","onsite_conversion.lead_grouped","onsite_conversion.messaging_conversation_started_7d"];
  return actions.filter(a=>t.includes(a.action_type)).reduce((s,a)=>s+parseInt(a.value||0),0);
}

let S={screen:"setup",token:"",rawId:"",tab:"perf",rl:{app:0,acct:0},monthly:null,campaigns:null,loading:false,error:null,updAt:null};
let lastT=0, chart=null;

const set=p=>{S={...S,...p};render();};
const aid=()=>S.rawId?"act_"+S.rawId.replace(/^act_/,""):"";

function readH(h){
  try{
    const a=JSON.parse(h.get("x-app-usage")||"{}"),b=JSON.parse(h.get("x-ad-account-usage")||"{}");
    const app=Math.max(a.call_count||0,a.total_cputime||0,a.total_time||0),acct=b.acc_id_util_pct||0;
    S.rl={app:Math.round(app),acct:Math.round(acct)};return Math.max(app,acct);
  }catch{return 0;}
}

async function api(path,params={}){
  const w=THROTTLE-(Date.now()-lastT);if(w>0)await new Promise(r=>setTimeout(r,w));lastT=Date.now();
  const u=new URL(API+"/"+path);u.searchParams.set("access_token",S.token);
  for(const[k,v]of Object.entries(params))u.searchParams.set(k,v);
  const res=await fetch(u.toString());const pct=readH(res.headers);
  if(pct>=STOP)throw new Error("Límite de API ("+Math.round(pct)+"%). Espera unos minutos.");
  if(pct>=WARN)await new Promise(r=>setTimeout(r,800));
  const j=await res.json();if(j.error)throw new Error(j.error.message);return j;
}

async function loadPerf(){
  set({loading:true,error:null});
  const today=new Date().toISOString().split("T")[0];
  try{
    const d=await api(aid()+"/insights",{fields:"impressions,clicks,ctr,reach,frequency,actions",time_range:JSON.stringify({since:SINCE,until:today}),time_increment:"monthly",level:"account",limit:50});
    set({loading:false,monthly:d.data||[],updAt:fNow()});
  }catch(e){set({loading:false,error:e.message});}
}

async function loadCamp(){
  set({loading:true,error:null});
  try{
    const d=await api(aid()+"/campaigns",{fields:"name,status,objective,created_time,insights{actions,impressions,clicks,ctr}",limit:100});
    set({loading:false,campaigns:d.data||[],updAt:fNow()});
  }catch(e){set({loading:false,error:e.message});}
}

function switchTab(t){set({tab:t});if(t==="perf"&&!S.monthly)loadPerf();if(t==="camp"&&!S.campaigns)loadCamp();}
function connect(){if(!S.token||!S.rawId)return;set({screen:"dashboard"});loadPerf();}
function disconnect(){set({screen:"setup",monthly:null,campaigns:null,error:null,rl:{app:0,acct:0},updAt:null});}
function refresh(){if(S.tab==="perf"){set({monthly:null});loadPerf();}else{set({campaigns:null});loadCamp();}}

// ── Render ────────────────────────────────────────────────────────────────────
function render(){
  document.getElementById("app").innerHTML=S.screen==="setup"?rSetup():rDash();
  bind();
  if(S.screen==="dashboard"&&S.tab==="perf"&&S.monthly&&!S.loading)drawChart();
}

function rSetup(){return`
  <div class="sw">
    <div class="sl">Open C60</div>
    <div class="ss">Panel de Generación de Leads</div>
    <div class="sc">
      <h2>Conectar cuenta de Meta Ads</h2>
      <div class="fi"><label>Access Token</label><input type="password" id="it" placeholder="EAAxxxxx..." value="${esc(S.token)}"/></div>
      <div class="fi"><label>Ad Account ID</label><input type="text" id="ii" placeholder="act_123456789" value="${esc(S.rawId)}"/><div class="hint">Con o sin el prefijo act_</div></div>
      <button class="btn-c" id="bc" ${!S.token||!S.rawId?"disabled":""}>Conectar →</button>
    </div>
  </div>`;}

function rDash(){
  const mx=Math.max(S.rl.app,S.rl.acct);
  const rc=mx>=STOP?"#ef4444":mx>=WARN?"#f59e0b":"#22c55e";
  return`
  <div class="tb">
    <div class="tb-brand"><div class="tb-logo">Open C60</div><div class="tb-sub">Panel de Leads · Meta Ads</div></div>
    <div class="tb-right">
      ${S.updAt?`<div class="upd">Actualizado: ${S.updAt}</div>`:""}
      <div class="rl-row"><div class="rl-bar"><div class="rl-fill" style="width:${Math.min(mx,100)}%;background:${rc}"></div></div>API ${mx}%</div>
      <button class="btn-out" id="bd">Salir</button>
    </div>
  </div>
  <div class="tabbar">
    <button class="tab ${S.tab==="perf"?"on":""}" data-tab="perf">Rendimiento</button>
    <button class="tab ${S.tab==="camp"?"on":""}" data-tab="camp">Campañas</button>
    <div class="tab-r"><button class="btn-ref" id="br" ${S.loading?"disabled":""}>↺ Actualizar</button></div>
  </div>
  <div class="main">
    ${S.error?`<div class="err">⚠ ${esc(S.error)}</div>`:""}
    ${S.loading?`<div class="loading"><div class="spin"></div><span>Cargando datos…</span></div>`:""}
    ${!S.loading&&S.tab==="perf"&&S.monthly?rPerf():""}
    ${!S.loading&&S.tab==="camp"&&S.campaigns?rCamp():""}
  </div>
  <div class="foot">Open C60 · Panel de Leads · Datos desde enero 2025</div>`;}

function rPerf(){
  const data=S.monthly;
  if(!data.length)return`<div class="empty">Sin datos desde enero 2025.</div>`;
  const tot=data.reduce((a,r)=>({l:a.l+leads(r.actions),i:a.i+parseInt(r.impressions||0),c:a.c+parseInt(r.clicks||0),r:a.r+parseInt(r.reach||0)}),{l:0,i:0,c:0,r:0});
  const ctr=tot.i>0?(tot.c/tot.i*100):0, conv=tot.c>0?(tot.l/tot.c*100):0;
  return`
  <div class="kpi-grid">
    <div class="kc dark"><div class="kc-label">Leads totales</div><div class="kc-val">${fn(tot.l)}</div><div class="kc-sub">Desde enero 2025</div></div>
    <div class="kc"><div class="kc-label">Impresiones</div><div class="kc-val">${fn(tot.i)}</div><div class="kc-sub">Total acumulado</div></div>
    <div class="kc"><div class="kc-label">Alcance</div><div class="kc-val">${fn(tot.r)}</div><div class="kc-sub">Personas únicas</div></div>
    <div class="kc"><div class="kc-label">CTR promedio</div><div class="kc-val">${fp(ctr)}</div><div class="kc-sub">Clics / Impresiones</div></div>
    <div class="kc"><div class="kc-label">Tasa conversión</div><div class="kc-val">${fp(conv)}</div><div class="kc-sub">Leads / Clics</div></div>
  </div>
  <div class="ch-card">
    <div class="ch-head"><div><div class="ch-title">Leads por mes</div><div class="ch-sub">Evolución mensual · enero 2025 – hoy</div></div></div>
    <div class="ch-wrap"><canvas id="lc" role="img" aria-label="Gráfica de leads por mes desde enero 2025"></canvas></div>
  </div>
  <div class="tc">
    <div class="tc-head"><div class="tc-title">Desglose mensual</div></div>
    <div class="tw"><table>
      <thead><tr><th>Mes</th><th class="r">Leads</th><th class="r">Impresiones</th><th class="r">Alcance</th><th class="r">Clics</th><th class="r">CTR</th><th class="r">Conv.</th></tr></thead>
      <tbody>
        ${[...data].reverse().map(r=>{
          const l=leads(r.actions),i=parseInt(r.impressions||0),c=parseInt(r.clicks||0);
          const conv=c>0?(l/c*100).toFixed(2)+"%":"—";
          const d=r.date_start?new Date(r.date_start+"T12:00:00"):null;
          const lbl=d?MES_F[d.getMonth()]+" "+d.getFullYear():r.date_start||"—";
          return`<tr><td class="td-m">${esc(lbl)}</td><td class="r td-l">${fn(l)}</td><td class="r td-n">${fn(i)}</td><td class="r td-n">${fn(parseInt(r.reach||0))}</td><td class="r td-n">${fn(c)}</td><td class="r">${fp(r.ctr)}</td><td class="r">${conv}</td></tr>`;
        }).join("")}
      </tbody>
    </table></div>
  </div>`;}

function rCamp(){
  const data=S.campaigns;
  if(!data.length)return`<div class="empty">Sin campañas.</div>`;
  return`
  <div class="tc">
    <div class="tc-head"><div class="tc-title">${data.length} campaña${data.length!==1?"s":""}</div></div>
    <div class="tw"><table>
      <thead><tr><th style="width:38%">Campaña</th><th>Estado</th><th>Objetivo</th><th class="r">Leads</th><th class="r">Impresiones</th><th class="r">CTR</th><th>Creada</th></tr></thead>
      <tbody>
        ${data.map(c=>{
          const st=ST[c.status]||{l:c.status,bg:"#F3F4F6",c:"#4B5563"};
          const ins=c.insights?.data?.[0];
          const l=ins?leads(ins.actions):null;
          return`<tr>
            <td style="overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:0;min-width:140px" title="${esc(c.name)}">${esc(c.name)}</td>
            <td><span class="badge" style="background:${st.bg};color:${st.c}">${st.l}</span></td>
            <td style="color:#6B7280;font-size:12px">${OBJ[c.objective]||c.objective||"—"}</td>
            <td class="r td-l">${l!==null?fn(l):"—"}</td>
            <td class="r td-n">${ins?fn(ins.impressions):"—"}</td>
            <td class="r">${ins?fp(ins.ctr):"—"}</td>
            <td style="color:#6B7280;font-size:12px">${fd(c.created_time)}</td>
          </tr>`;
        }).join("")}
      </tbody>
    </table></div>
  </div>`;}

function drawChart(){
  const canvas=document.getElementById("lc");
  if(!canvas||!S.monthly)return;
  if(chart){chart.destroy();chart=null;}
  const sorted=[...S.monthly].sort((a,b)=>a.date_start>b.date_start?1:-1);
  const labels=sorted.map(r=>{if(!r.date_start)return"";const d=new Date(r.date_start+"T12:00:00");return MES[d.getMonth()]+" '"+String(d.getFullYear()).slice(2);});
  const vals=sorted.map(r=>leads(r.actions));
  const maxIdx=vals.indexOf(Math.max(...vals));
  chart=new Chart(canvas,{
    type:"bar",
    data:{labels,datasets:[{label:"Leads",data:vals,backgroundColor:vals.map((_,i)=>i===vals.length-1?"#2563EB":i===maxIdx?"#059669":"#0F1E3C"),borderRadius:6,borderSkipped:false}]},
    options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},tooltip:{callbacks:{title:ctx=>labels[ctx[0].dataIndex],label:ctx=>" "+ctx.raw.toLocaleString("es-MX")+" leads"}}},scales:{x:{grid:{display:false},ticks:{font:{size:11},color:"#9CA3AF"}},y:{grid:{color:"#F3F4F6"},ticks:{font:{size:11},color:"#9CA3AF",precision:0},beginAtZero:true}}}
  });
}

function bind(){
  const it=document.getElementById("it"),ii=document.getElementById("ii");
  if(it)it.addEventListener("input",e=>{S.token=e.target.value;const b=document.getElementById("bc");if(b)b.disabled=!S.token||!S.rawId;});
  if(ii){ii.addEventListener("input",e=>{S.rawId=e.target.value;const b=document.getElementById("bc");if(b)b.disabled=!S.token||!S.rawId;});ii.addEventListener("keydown",e=>{if(e.key==="Enter")connect();});}
  const bc=document.getElementById("bc");if(bc)bc.addEventListener("click",connect);
  document.querySelectorAll("[data-tab]").forEach(el=>el.addEventListener("click",()=>switchTab(el.dataset.tab)));
  const br=document.getElementById("br");if(br)br.addEventListener("click",refresh);
  const bd=document.getElementById("bd");if(bd)bd.addEventListener("click",disconnect);
}

render();
</script>
</body>
</html>
